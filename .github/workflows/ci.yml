name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [user-app, admin-panel, backend/functions]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck ${{ matrix.package }}
        run: npx tsc --project ${{ matrix.package }}/tsconfig.json --noEmit

  deploy-rules:
    name: Deploy Firestore Rules
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore & Storage rules
        run: firebase deploy --only firestore:rules,storage --token "${{ secrets.FIREBASE_TOKEN }}"

  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build functions
        run: npm run --prefix backend/functions build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy functions
        run: firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}"
